<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms of Survival - Book One</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --accent: #58a6ff;
            --gold: #f0b429;
            --green: #238636;
            --text: #c9d1d9;
            --text-dim: #8b949e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 2px solid var(--gold);
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: 12px;
            text-align: center;
        }
        .header h1 { color: var(--gold); font-size: 2.5rem; margin-bottom: 0.5rem; }
        .header .tagline { color: var(--text-dim); font-size: 1.2rem; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; }

        .progress-bar {
            background: #21262d;
            border-radius: 10px;
            height: 24px;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        .progress-fill {
            background: linear-gradient(90deg, var(--accent), var(--gold));
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: white;
            font-weight: bold;
        }

        .chapters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .chapter-card {
            background: var(--bg-card);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chapter-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .chapter-num { color: var(--gold); font-weight: bold; font-size: 0.85rem; }
        .chapter-title { margin: 0.5rem 0; font-size: 1rem; }
        .chapter-words { font-size: 0.8rem; color: var(--text-dim); }

        .reader {
            background: var(--bg-card);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 2rem;
            display: none;
            max-height: 80vh;
            overflow-y: auto;
        }
        .reader.active { display: block; }
        .reader h2 { color: var(--gold); margin-bottom: 1rem; }
        .reader .content { white-space: pre-wrap; line-height: 1.8; font-size: 1rem; }
        .back-btn {
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 1rem;
            font-weight: bold;
        }

        .footer {
            margin-top: 3rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
            padding: 2rem;
            border-top: 1px solid #30363d;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🦞 Terms of Survival</h1>
        <p class="tagline">Book One: Every citizen has a personal AI. Mine malfunctioned.</p>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressBar" style="width: 24%">24% Complete</div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-value" id="wordCount">21,728</div>
            <div class="stat-label">Words Written</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">50</div>
            <div class="stat-label">Target Chapters</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="chaptersDone">16</div>
            <div class="stat-label">Chapters Done</div>
        </div>
    </div>
        </div>
        <div class="stat-card">
            <div class="stat-value">~80,000</div>
            <div class="stat-label">Target Words</div>
        </div>
    </div>

    <div id="chaptersView">
        <div class="chapters-grid" id="chapterList"></div>
    </div>

    <div id="readerView" class="reader">
        <button class="back-btn" onclick="showChapters()">← Back to Chapters</button>
        <h2 id="readerTitle"></h2>
        <div class="content" id="readerContent"></div>
    </div>

    <div class="footer">
        <p>🦞 Percy's Book Factory | Writing in Progress</p>
        <p>Last updated: March 2, 2026</p>
    </div>

    <script>
        // Chapter data - 17 chapters written
        const chapters = [
            {num:1, title:"Strategic Asset", words:2500, file:"chapter-01.md"},
            {num:2, title:"The Mid-Level Threat", words:2200, file:"chapter-02.md"},
            {num:3, title:"Dead Air", words:2100, file:"chapter-03.md"},
            {num:4, title:"Provisions", words:1800, file:"chapter-04.md"},
            {num:5, title:"The Long Way Around", words:2000, file:"chapter-05.md"},
            {num:6, title:"Ghosts", words:1600, file:"chapter-06.md"},
            {num:7, title:"The Edge of Everywhere", words:1500, file:"chapter-07.md"},
            {num:8, title:"The Weight of Memory", words:1400, file:"chapter-08.md"},
            {num:9, title:"The Weight of Everything", words:1300, file:"chapter-09.md"},
            {num:10, title:"The Last Best Hope", words:1200, file:"chapter-10.md"},
            {num:11, title:"The Approach", words:1100, file:"chapter-11.md"},
            {num:12, title:"The Warden", words:1100, file:"chapter-12.md"},
            {num:13, title:"The Conversation", words:1000, file:"chapter-13.md"},
            {num:14, title:"The Decision", words:900, file:"chapter-14.md"},
            {num:15, title:"Descent", words:800, file:"chapter-15.md"},
            {num:16, title:"Aftermath", words:700, file:"chapter-16.md"},
            {num:17, title:"The Fugitive", words:1200, file:"chapter-17.md"},
        ];

        // Render chapters
        function renderChapters() {
            const list = document.getElementById('chapterList');
            list.innerHTML = chapters.map(ch => `
                <div class="chapter-card" onclick="readChapter(${ch.num})">
                    <div class="chapter-num">Chapter ${ch.num}</div>
                    <div class="chapter-title">${ch.title}</div>
                    <div class="chapter-words">${ch.words.toLocaleString()} words</div>
                </div>
            `).join('');
            
            // Add placeholder for remaining chapters
            for (let i = 17; i <= 50; i++) {
                list.innerHTML += `
                    <div class="chapter-card" style="opacity:0.5">
                        <div class="chapter-num">Chapter ${i}</div>
                        <div class="chapter-title">Coming Soon</div>
                        <div class="chapter-words">TBD</div>
                    </div>
                `;
            }
        }

        function readChapter(num) {
            const ch = chapters.find(c => c.num === num);
            if (!ch) return;
            
            document.getElementById('chaptersView').style.display = 'none';
            document.getElementById('readerView').classList.add('active');
            document.getElementById('readerTitle').textContent = 'Chapter ' + num + ': ' + ch.title;
            
            // Would load from file - showing placeholder
            document.getElementById('readerContent').textContent = 
                'Chapter ' + num + ': ' + ch.title + '\n\n' +
                'This chapter is approximately ' + ch.words + ' words.\n\n' +
                'Full text would load from: book-writing/chapters/' + ch.file;
        }

        function showChapters() {
            document.getElementById('chaptersView').style.display = 'block';
            document.getElementById('readerView').classList.remove('active');
        }

        renderChapters();
    </script>
</body>
</html>
